<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>html,body{background:#F4EFE6;margin:0}</style>
  <title>Journal · Oath House</title>
  <link rel="icon" type="image/png" href="logos/oath-mark-dark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" /></noscript>
  <style>
    :root{ --earth:#863A24; --ink:#25241f; --soft:#7c7264; --paper:#F4EFE6; --line:rgba(37,36,31,.14);
      --serif:'Spectral',Georgia,serif; --sans:'Inter',system-ui,sans-serif; }
    *{box-sizing:border-box;margin:0}
    body{background:var(--paper);color:var(--ink);font-family:var(--serif);font-weight:300;line-height:1.75;
      -webkit-font-smoothing:antialiased}
    a{color:inherit}
    .art-top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center;
      padding:1.1rem clamp(1.4rem,5vw,3rem);background:rgba(244,239,230,.86);backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);font-family:var(--sans);font-weight:400}
    .art-top a{font-variant:small-caps;letter-spacing:.16em;font-size:.82rem;text-decoration:none;color:var(--soft);transition:color .3s}
    .art-top a:hover{color:var(--earth)}
    .art-brand{font-family:var(--serif);letter-spacing:.2em;color:var(--ink)!important}
    .wrap{max-width:760px;margin:0 auto;padding:clamp(2.4rem,6vw,5rem) clamp(1.4rem,5vw,2rem) 5rem}
    .eyebrow{font-family:var(--sans);font-variant:small-caps;letter-spacing:.22em;font-size:.78rem;color:var(--earth);
      display:flex;gap:.8rem;align-items:center;margin-bottom:1.4rem}
    .eyebrow .dot{width:4px;height:4px;border-radius:50%;background:var(--soft)}
    .eyebrow .date{color:var(--soft)}
    h1{font-weight:400;font-size:clamp(2.1rem,5.2vw,3.6rem);line-height:1.08;letter-spacing:-.01em;max-width:18ch}
    .hero{margin:clamp(2rem,5vw,3.4rem) 0;border-radius:3px;overflow:hidden;aspect-ratio:16/10;background:#e6ddcb}
    .hero img{width:100%;height:100%;object-fit:cover;display:block}
    .body{font-size:clamp(1.08rem,1.5vw,1.22rem);color:#332f28;max-width:62ch}
    .body p{margin:0 0 1.4rem}
    .body p:first-child::first-letter{font-size:3.1em;line-height:.8;float:left;margin:.05em .12em 0 0;color:var(--earth);font-weight:400}
    .art-foot{max-width:760px;margin:0 auto;padding:2rem clamp(1.4rem,5vw,2rem) 4rem;border-top:1px solid var(--line)}
    .art-foot a{font-variant:small-caps;letter-spacing:.18em;font-size:.9rem;text-decoration:none;color:var(--earth);
      display:inline-flex;gap:.5em;transition:gap .3s}
    .art-foot a:hover{gap:1em}
    .msg{font-style:italic;color:var(--soft);text-align:center;padding:5rem 1rem}
    @media(prefers-reduced-motion:no-preference){.wrap{animation:rise .8s cubic-bezier(.2,.8,.2,1)}}
    @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
  <header class="art-top">
    <a href="/#stories">← The Journal</a>
    <a class="art-brand" href="/">Oath House</a>
  </header>

  <main id="art"><p class="msg">Loading…</p></main>

  <script>
    (async function(){
      const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      const id = new URLSearchParams(location.search).get('id');
      const art = document.getElementById('art');
      if(!id){ art.innerHTML = '<p class="msg">Story not found. <a href="/#stories">Back to the Journal</a></p>'; return; }
      let story;
      try{
        const r = await fetch('/api/story/'+encodeURIComponent(id));
        if(!r.ok) throw 0;
        story = (await r.json()).story;
      }catch(e){
        art.innerHTML = '<p class="msg">This story isn’t available. <a href="/#stories">Back to the Journal</a></p>'; return;
      }
      document.title = story.title + ' · Oath House Journal';
      const paras = (story.body||'').split(/\n{2,}/).filter(Boolean).map(p=>'<p>'+esc(p).replace(/\n/g,'<br>')+'</p>').join('');
      art.innerHTML =
        '<div class="wrap">'
        + '<p class="eyebrow"><span>'+esc(story.category||'Journal')+'</span><span class="dot"></span><span class="date">'+esc(story.date||'')+'</span></p>'
        + '<h1>'+esc(story.title||'')+'</h1>'
        + (story.image ? '<div class="hero"><img src="'+esc(story.image)+'" alt=""></div>' : '')
        + '<div class="body">'+(paras || '<p>'+esc(story.excerpt||'')+'</p>')+'</div>'
        + '</div>'
        + '<footer class="art-foot"><a href="/#stories">← Back to the Journal</a></footer>';
    })();
  </script>
</body>
</html>
