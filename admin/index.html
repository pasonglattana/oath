<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oath House · Studio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/logos/oath-mark-dark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>

  <!-- LOGIN -->
  <div class="login" id="login" hidden>
    <form class="login-card" id="loginForm">
      <img class="login-mark" src="/logos/oath-mark-dark.png" alt="Oath House" />
      <p class="login-kicker">The Studio</p>
      <h1>Oath House</h1>
      <p class="login-sub">Sign in to manage what the house is showing the world.</p>
      <label for="pw">Password</label>
      <input type="password" id="pw" autocomplete="current-password" placeholder="••••••••" required />
      <button type="submit">Enter the studio</button>
      <p class="login-msg" id="loginMsg" role="status"></p>
    </form>
  </div>

  <!-- APP -->
  <div class="app" id="app" hidden>
    <aside class="side">
      <div class="side-brand">
        <img src="/logos/oath-mark-dark.png" alt="" />
        <span>Oath House<br/><b>Studio</b></span>
      </div>
      <nav class="side-nav" id="nav">
        <button class="active" data-view="events"><span>◷</span> Calendar Events</button>
        <button data-view="reservations"><span>✦</span> Bookings</button>
        <button data-view="experiences"><span>❖</span> Experiences</button>
        <button data-view="stories"><span>✎</span> Journal</button>
        <button data-view="instructors"><span>☺</span> Instructors</button>
        <button data-view="media"><span>❏</span> Photos</button>
        <button data-view="music"><span>♪</span> Music</button>
        <button data-view="subscribers"><span>✉</span> Newsletter</button>
        <button data-view="settings"><span>⚙</span> Settings</button>
      </nav>
      <div class="side-foot">
        <a href="/" target="_blank" rel="noopener">View site ↗</a>
        <button id="logout">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <header class="main-head">
        <div>
          <h2 id="viewTitle">Calendar Events</h2>
          <p id="viewSub" class="view-sub"></p>
        </div>
        <button class="btn-primary" id="addBtn">+ Add new</button>
      </header>
      <div class="list" id="list"></div>
    </main>
  </div>

  <!-- EDIT DRAWER -->
  <div class="drawer-veil" id="drawerVeil" hidden></div>
  <aside class="editor" id="editor" hidden aria-label="Editor">
    <div class="editor-head">
      <h3 id="editorTitle">Edit</h3>
      <button class="editor-close" id="editorClose" aria-label="Close">✕</button>
    </div>
    <form id="editorForm" class="editor-body"></form>
    <div class="editor-foot">
      <button type="button" class="btn-danger" id="deleteBtn" hidden>Delete</button>
      <span style="flex:1"></span>
      <button type="button" class="btn-ghost" id="cancelBtn">Cancel</button>
      <button type="button" class="btn-primary" id="saveBtn">Save</button>
    </div>
  </aside>

  <div class="toast" id="toast" hidden></div>

  <script src="/admin/admin.js"></script>
</body>
</html>
